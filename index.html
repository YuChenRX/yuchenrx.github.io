    <script>
      // 检查 URL 中的重定向参数
      var urlParams = new URLSearchParams(window.location.search);
      var redirectPath = urlParams.get('p');
      if (redirectPath) {
        // 移除重定向参数
        urlParams.delete('p');
        var newSearch = urlParams.toString() ? '?' + urlParams.toString() : '';
        var newUrl = window.location.origin + redirectPath + newSearch + window.location.hash;
        // 重定向到正确的路径
        window.history.replaceState({}, document.title, newUrl);
      }
    </script>
